<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Quantum Randomness & ESP8266 Monitor</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 20px; max-width: 900px; margin: auto;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: #fff; }
    h1 { text-align: center; font-size: 2.2em; text-shadow: 0 0 8px rgba(0,255,255,0.8); }
    label { display:block; margin-top:16px; font-weight:600; }
    input, select, button {
      font-size: 16px; padding: 10px; margin-top: 6px; width: 100%; border-radius: 8px;
      border: none; box-sizing: border-box;
    }
    input, select { background: rgba(255,255,255,0.1); color: #fff; }
    button { background: #00c6ff; color: #fff; cursor: pointer; }
    button:hover { background: #0072ff; box-shadow: 0 0 12px #00c6ff; }
    pre { background: rgba(0,0,0,0.6); padding: 12px; border-radius: 10px; min-height: 80px; overflow:auto; }
    .section { margin-top: 30px; padding: 20px; border-radius: 12px; background: rgba(0,0,0,0.4); }
  </style>
</head>
<body>
  <h1>⚛️ Quantum Randomness & 📡 ESP8266 Monitor</h1>
  <p style="text-align:center">Generate quantum random bits and view ESP8266 sensor data.</p>

  <div class="section">
    <h2>Quantum Randomness</h2>
    <label>Bits to generate
      <input id="bits" type="number" value="128" min="1" max="8192" />
    </label>
    <label>Format
      <select id="format">
        <option value="hex">Hex</option>
        <option value="b64">Base64</option>
      </select>
    </label>
    <label>Use IBM backend?
      <select id="ibm">
        <option value="0">No (local simulator)</option>
        <option value="1">Yes (IBM)</option>
      </select>
    </label>
    <div style="margin-top:20px; display:flex; gap:10px;">
      <button id="gen">⚡ Generate</button>
      <button id="download">⬇ Download Key</button>
    </div>
    <h3>Result</h3>
    <pre id="result">No data yet.</pre>
  </div>

  <div class="section">
    <h2>ESP8266 Data</h2>
    <button id="refreshESP">🔄 Refresh ESP8266 Data</button>
    <h3>Latest ESP8266 Payload</h3>
    <pre id="esp8266">No data yet.</pre>
  </div>

<script>
const result = document.getElementById('result');
document.getElementById('gen').addEventListener('click', async () => {
  const bits = parseInt(document.getElementById('bits').value||'128');
  const format = document.getElementById('format').value;
  const ibm = document.getElementById('ibm').value;
  result.textContent = "Generating...";
  try {
    const resp = await fetch(`/api/random?bits=${bits}&format=${format}&ibm=${ibm}`);
    const j = await resp.json();
    result.textContent = JSON.stringify(j, null, 2);
  } catch (e) {
    result.textContent = '⚠️ Request failed: ' + e;
  }
});

document.getElementById('download').addEventListener('click', () => {
  const txt = result.textContent;
  if (!txt || txt.includes("No data")) { alert("Generate a key first."); return; }
  const b = new Blob([txt], {type:'application/json'});
  const url = URL.createObjectURL(b);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'quantum_key.json';
  a.click();
  URL.revokeObjectURL(url);
});

// ESP8266 refresh
const espDiv = document.getElementById('esp8266');
document.getElementById('refreshESP').addEventListener('click', async () => {
  espDiv.textContent = "Loading...";
  try {
    const resp = await fetch("/api/esp8266");
    const j = await resp.json();
    espDiv.textContent = JSON.stringify(j, null, 2);
  } catch (e) {
    espDiv.textContent = "⚠️ Failed: " + e;
  }
});
</script>
</body>
</html>
